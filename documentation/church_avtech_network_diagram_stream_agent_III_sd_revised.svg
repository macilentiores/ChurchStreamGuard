<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600">
<defs>
  <style>
    .title { font-family: Segoe UI, Arial, sans-serif; font-size: 36px; font-weight: 800; fill:#102033; }
    .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 600; fill:#415066; }
    .section { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 800; fill:#0b2a4a; }
    .label { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill:#102033; }
    .small { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill:#213245; }
    .tiny { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; fill:#213245; }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 14px; fill:#102033; }
    .box { fill:#ffffff; stroke:#1f5fa8; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .router { fill:#f5fbff; stroke:#105e9c; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .lan { fill:#f5fff7; stroke:#2c8d42; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .pc { fill:#fff9e8; stroke:#d89300; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .audio { fill:#fff6f2; stroke:#b84d2e; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .remote { fill:#f7f2ff; stroke:#6a42ba; stroke-width:2.3; rx:16; ry:16; filter:url(#shadow); }
    .note { fill:#fffdf2; stroke:#d89300; stroke-width:2.1; rx:14; ry:14; filter:url(#shadow); }
    .soft { fill:#f6f8fb; stroke:#95a3b5; stroke-width:1.8; rx:14; ry:14; filter:url(#shadow); }
    .ether { stroke:#1f73d1; stroke-width:4; fill:none; marker-start:url(#arrowBlue); marker-end:url(#arrowBlue); }
    .internet { stroke:#1f73d1; stroke-width:3.5; fill:none; stroke-dasharray:11 8; marker-start:url(#arrowBlue); marker-end:url(#arrowBlue); }
    .wifi { stroke:#1f73d1; stroke-width:3.5; fill:none; stroke-dasharray:7 7; marker-start:url(#arrowBlue); marker-end:url(#arrowBlue); }
    .audioLine { stroke:#198754; stroke-width:4; fill:none; marker-end:url(#arrowGreen); }
    .midi { stroke:#7b2cbf; stroke-width:4; fill:none; marker-end:url(#arrowPurple); }
    .rtmp { stroke:#e85d04; stroke-width:4; fill:none; stroke-dasharray:11 7; marker-end:url(#arrowOrange); }
    .web { stroke:#6c757d; stroke-width:3.2; fill:none; stroke-dasharray:7 7; marker-end:url(#arrowGrey); }
    .pathLabel { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill:#334155; }
    .foot { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill:#536173; }
  </style>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
  </filter>
  <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1f73d1"/></marker>
  <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#198754"/></marker>
  <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7b2cbf"/></marker>
  <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#e85d04"/></marker>
  <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#6c757d"/></marker>
</defs>
<rect width="100%" height="100%" fill="#fbfcfe"/>
<text x="40" y="48" class="title">Stream Agent III sd — Church AV Tech Network</text>
<text x="40" y="80" class="subtitle">OBS, Axis cameras, Mackie DL32SE, ER605/WireGuard, Web HUD, Proclaim MIDI, Pi WOL helper, and YouTube Live</text>
<path class="internet" d="M 1075 230 L 895 300"/>
<path class="internet" d="M 1250 165 L 1820 165"/>
<path class="ether" d="M 1130 390 L 1280 390"/>
<path class="internet" d="M 1820 270 L 1795 270 L 1795 410 L 1790 410"/>
<path class="ether" d="M 1420 510 L 1420 570"/>
<path class="ether" d="M 1100 640 L 590 640"/>
<path class="ether" d="M 1600 640 L 1810 640"/>
<path class="ether" d="M 1350 710 L 1350 760 L 1035 760 L 1035 810"/>
<path class="ether" d="M 1510 710 L 1510 810"/>
<path class="ether" d="M 250 760 L 250 850"/>
<path class="ether" d="M 120 670 L 40 670 L 40 1215 L 80 1215"/>
<path class="wifi" d="M 2050 750 L 2050 805"/>
<path class="ether" d="M 2310 655 L 2360 655 L 2360 1160 L 2340 1160"/>
<path class="web" d="M 2340 305 L 2360 305 L 2360 780 L 1360 780 L 1360 850"/>
<path class="web" d="M 2360 1140 L 2340 1140"/>
<path class="web" d="M 1850 900 L 1785 900 L 1785 765 L 1300 765 L 1300 810"/>
<path class="audioLine" d="M 1420 920 L 1360 920"/>
<path class="audioLine" d="M 1420 1165 L 1360 1085"/>
<path class="midi" d="M 1035 1180 L 1035 1140"/>
<path class="rtmp" d="M 1360 955 L 1390 955 L 1390 1420 L 1360 1420"/>
<text x="960" y="285" class="pathLabel">Internet service</text>
<text x="1162" y="376" class="pathLabel">Arris LAN / ER605 WAN</text>
<text x="1440" y="548" class="pathLabel">AV LAN</text>
<text x="725" y="623" class="pathLabel">Ethernet / RTSP / VAPIX</text>
<text x="1640" y="623" class="pathLabel">Ethernet</text>
<text x="2060" y="788" class="pathLabel">Wi‑Fi</text>
<text x="1398" y="1360" class="pathLabel">RTMP outbound</text>
<text x="1370" y="900" class="pathLabel">audio</text>
<text x="1060" y="1165" class="pathLabel">MIDI via loopMIDI</text>
<text x="1385" y="770" class="pathLabel">browser / RDP / Web HUD</text>
<rect x="40" y="110" width="450" height="200" class="note"/>
<text x="58" y="140" class="section">Purpose</text>
<text x="58" y="168" class="small">Shows the current church streaming architecture:</text>
<text x="58" y="186" class="small">  control network, camera video, audio paths, Web</text>
<text x="58" y="204" class="small">  HUD, remote access, and YouTube output.</text>
<text x="58" y="222" class="small">Goal: allow the system to be understood,</text>
<text x="58" y="240" class="small">  operated, and rebuilt by future AV tech</text>
<text x="58" y="258" class="small">  volunteers.</text>
<text x="58" y="276" class="small">Sensitive passwords and stream keys are</text>
<text x="58" y="294" class="small">  intentionally not shown.</text>
<rect x="900" y="100" width="350" height="130" class="soft"/>
<text x="918" y="130" class="section">Internet</text>
<text x="918" y="158" class="small">YouTube Live</text>
<text x="918" y="176" class="small">Remote WireGuard access</text>
<text x="918" y="194" class="small">Web access and updates</text>
<rect x="660" y="300" width="470" height="180" class="router"/>
<text x="678" y="330" class="section">Arris NVG448BQ ISP Gateway</text>
<text x="678" y="358" class="small">Gateway / upstream router: 172.16.1.254</text>
<text x="678" y="376" class="small">ER605 WAN is reserved on Arris LAN.</text>
<text x="678" y="394" class="small">Forward WireGuard UDP 51820 to the ER605 WAN IP.</text>
<text x="678" y="412" class="small">Keep ER605 WAN on DHCP/automatic; reserve by WAN</text>
<text x="678" y="430" class="small">  MAC.</text>
<rect x="1280" y="300" width="510" height="210" class="router"/>
<text x="1298" y="330" class="section">TP-Link ER605 Router / VPN</text>
<text x="1298" y="358" class="small">WAN: DHCP from Arris 172.16.1.x</text>
<text x="1298" y="376" class="small">LAN: 192.168.88.0/24 AV subnet</text>
<text x="1298" y="394" class="small">Likely gateway: 192.168.88.1</text>
<text x="1298" y="412" class="small">WireGuard server: UDP 51820</text>
<text x="1298" y="430" class="small">Routes local cameras, mixer, BeelinkOBS, AP, Pi</text>
<text x="1298" y="448" class="small">  helper, and LAN switches.</text>
<rect x="1820" y="100" width="520" height="220" class="remote"/>
<text x="1838" y="130" class="section">Remote Access</text>
<text x="1838" y="158" class="small">Home PC or laptop connects by WireGuard.</text>
<text x="1838" y="176" class="small">Use RDP to BeelinkOBS when needed.</text>
<text x="1838" y="194" class="small">Use Web HUD/Director over VPN:</text>
<text x="1838" y="212" class="small">http://192.168.88.102:8765</text>
<text x="1838" y="230" class="small">Use Pi WOL page to wake BeelinkOBS remotely.</text>
<text x="1838" y="248" class="small">YouTube Live can be checked from any normal browser.</text>
<rect x="1100" y="570" width="500" height="140" class="lan"/>
<text x="1118" y="600" class="section">ER605 LAN / AV subnet</text>
<text x="1118" y="628" class="small">All connected devices use 192.168.88.x.</text>
<text x="1118" y="646" class="small">LAN ports feed PoE switch, BeelinkOBS, DL32SE mixer,</text>
<text x="1118" y="664" class="small">  access point, Pi helper, and/or extra switch.</text>
<text x="1118" y="682" class="small">Blue double-arrow lines represent two-way Ethernet</text>
<text x="1118" y="700" class="small">  communication.</text>
<rect x="120" y="580" width="470" height="180" class="lan"/>
<text x="138" y="610" class="section">PoE Switch</text>
<text x="138" y="638" class="small">Powers and connects Axis cameras.</text>
<text x="138" y="656" class="small">Camera streams are RTSP to OBS through the AV LAN.</text>
<text x="138" y="674" class="small">Stream Agent sends Axis VAPIX preset commands over</text>
<text x="138" y="692" class="small">  the same LAN.</text>
<text x="138" y="710" class="small">Use stable wired Ethernet for all camera paths.</text>
<rect x="80" y="850" width="500" height="210" class="box"/>
<text x="98" y="880" class="section">Axis Camera — West</text>
<text x="98" y="908" class="small">IP: 192.168.88.2</text>
<text x="98" y="926" class="small">OBS source: West_axis</text>
<text x="98" y="944" class="small">Scene: West View</text>
<text x="98" y="962" class="small">Provides RTSP video and may provide embedded audio</text>
<text x="98" y="980" class="small">  in Axis-audio mode.</text>
<text x="98" y="998" class="small">Receives PTZ preset calls from Stream Agent III sd.</text>
<rect x="80" y="1100" width="500" height="230" class="box"/>
<text x="98" y="1130" class="section">Axis Camera — East</text>
<text x="98" y="1158" class="small">IP: 192.168.88.3</text>
<text x="98" y="1176" class="small">OBS source: East_axis</text>
<text x="98" y="1194" class="small">Scene: East View</text>
<text x="98" y="1212" class="small">Preset names must match West exactly, including</text>
<text x="98" y="1230" class="small">  case; for example, Podium not podium.</text>
<text x="98" y="1248" class="small">Older documentation may call this Center; current</text>
<text x="98" y="1266" class="small">  naming is East.</text>
<rect x="710" y="810" width="650" height="330" class="pc"/>
<text x="728" y="840" class="section">BeelinkOBS Streaming PC</text>
<text x="728" y="868" class="small">IP reservation: 192.168.88.102</text>
<text x="728" y="886" class="small">Runs OBS Studio, Stream Agent III sd, Proclaim, Master Fader,</text>
<text x="728" y="904" class="small">  loopMIDI, Web HUD, and Director.</text>
<text x="728" y="922" class="small">Web HUD: http://127.0.0.1:8765 locally or http://192.168.88.102:8765</text>
<text x="728" y="940" class="small">  from LAN/VPN.</text>
<text x="728" y="958" class="small">OBS receives camera RTSP streams and Proclaim overlay source: slides.</text>
<text x="728" y="976" class="small">OBS sends RTMP/RTMPS stream to YouTube Live using the persistent</text>
<text x="728" y="994" class="small">  stream key and scheduled placeholder.</text>
<text x="728" y="1012" class="small">Task Scheduler normally auto-launches the required apps at logon.</text>
<rect x="710" y="1180" width="650" height="200" class="soft"/>
<text x="728" y="1210" class="section">Proclaim / MIDI Automation</text>
<text x="728" y="1238" class="small">Proclaim sends MIDI notes through loopMIDI to Stream Agent III sd.</text>
<text x="728" y="1256" class="small">Channel 1: NOW / immediate view.</text>
<text x="728" y="1274" class="small">Channel 2: NEXT / prepare the expected next camera view.</text>
<text x="728" y="1292" class="small">Notes 70–79: Pulpit, Panorama, Children’s Time, Altar, Choir, Screen,</text>
<text x="728" y="1310" class="small">  Band, Piano, Communion, Podium.</text>
<text x="728" y="1328" class="small">Notes 60/61/62: Start stream, stop stream, record toggle.</text>
<rect x="1420" y="810" width="350" height="220" class="audio"/>
<text x="1438" y="840" class="section">Mackie DL32SE Mixer</text>
<text x="1438" y="868" class="small">Ethernet-only mixer; no built-in</text>
<text x="1438" y="886" class="small">  Wi‑Fi.</text>
<text x="1438" y="904" class="small">Wired to ER605 LAN.</text>
<text x="1438" y="922" class="small">Controlled by Master Fader on</text>
<text x="1438" y="940" class="small">  PC/tablet.</text>
<text x="1438" y="958" class="small">Audio output feeds the selected OBS</text>
<text x="1438" y="976" class="small">  audio path or the Axis camera</text>
<text x="1438" y="994" class="small">  embedded-audio path.</text>
<rect x="1420" y="1060" width="350" height="230" class="audio"/>
<text x="1438" y="1090" class="section">Audio Modes</text>
<text x="1438" y="1118" class="small">Axis embedded: West_axis/East_axis</text>
<text x="1438" y="1136" class="small">  carry camera-injected audio; Sync</text>
<text x="1438" y="1154" class="small">  page hidden.</text>
<text x="1438" y="1172" class="small">ASIO shared: mixer output → audio</text>
<text x="1438" y="1190" class="small">  interface → OBS source ASIO_audio;</text>
<text x="1438" y="1208" class="small">  Sync page enabled.</text>
<text x="1438" y="1226" class="small">Use Add Existing for ASIO_audio in</text>
<text x="1438" y="1244" class="small">  OBS scenes.</text>
<rect x="1810" y="560" width="500" height="190" class="lan"/>
<text x="1828" y="590" class="section">Access Point / Church Wi‑Fi</text>
<text x="1828" y="618" class="small">Router in AP mode on 192.168.88.x LAN.</text>
<text x="1828" y="636" class="small">Tablet connects by Wi‑Fi for Web HUD/Director and</text>
<text x="1828" y="654" class="small">  Master Fader.</text>
<text x="1828" y="672" class="small">Pi WOL helper can plug into an AP LAN port if ER605</text>
<text x="1828" y="690" class="small">  LAN ports are full.</text>
<text x="1828" y="708" class="small">Do not run a second DHCP server on the AP.</text>
<rect x="1850" y="805" width="490" height="200" class="remote"/>
<text x="1868" y="835" class="section">Galaxy Tab S9+ / Operator Tablet</text>
<text x="1868" y="863" class="small">Uses Web HUD and Director page.</text>
<text x="1868" y="881" class="small">Can also run Master Fader for mixer control.</text>
<text x="1868" y="899" class="small">Shows camera previews, manual view buttons, audio</text>
<text x="1868" y="917" class="small">  faders, config, and manual fallback controls.</text>
<text x="1868" y="935" class="small">Connect to the church AV Wi‑Fi/AP on the</text>
<text x="1868" y="953" class="small">  192.168.88.x LAN.</text>
<rect x="1850" y="1050" width="490" height="220" class="lan"/>
<text x="1868" y="1080" class="section">Raspberry Pi 3B+ WOL Helper</text>
<text x="1868" y="1108" class="small">Reserved IP: 192.168.88.103</text>
<text x="1868" y="1126" class="small">Always-on local helper on church LAN.</text>
<text x="1868" y="1144" class="small">Serves a small web page to send Wake-on-LAN magic</text>
<text x="1868" y="1162" class="small">  packet to BeelinkOBS.</text>
<text x="1868" y="1180" class="small">Useful because WOL broadcasts do not reliably cross</text>
<text x="1868" y="1198" class="small">  WireGuard/NAT.</text>
<rect x="80" y="1370" width="520" height="150" class="note"/>
<text x="98" y="1400" class="section">Stream Agent Control Logic</text>
<text x="98" y="1428" class="small">Channel 1 note selects the current view. Channel 2 note</text>
<text x="98" y="1446" class="small">  prepares the next expected view on the off-air camera.</text>
<text x="98" y="1464" class="small">Blind delays hide PTZ movement, then Stream Agent cuts</text>
<text x="98" y="1482" class="small">  when the prepared camera is ready.</text>
<text x="98" y="1500" class="small">Director page gives manual fallback and preview</text>
<text x="98" y="1518" class="small">  confidence.</text>
<rect x="710" y="1410" width="650" height="130" class="soft"/>
<text x="728" y="1440" class="section">YouTube Live</text>
<text x="728" y="1468" class="small">OBS sends RTMP/RTMPS stream out through ER605 → Arris → Internet.</text>
<text x="728" y="1486" class="small">Viewers watch the scheduled YouTube Live placeholder/event.</text>
<text x="728" y="1504" class="small">The Web HUD can provide a View Live link or confidence viewer.</text>
<rect x="1420" y="1330" width="520" height="210" class="note"/>
<text x="1438" y="1360" class="section">Legend</text>
<text x="1438" y="1388" class="small">Blue solid with arrows both ends: two-way Ethernet /</text>
<text x="1438" y="1406" class="small">  local LAN</text>
<text x="1438" y="1424" class="small">Blue dashed with arrows both ends: Internet, VPN, or</text>
<text x="1438" y="1442" class="small">  Wi‑Fi path</text>
<text x="1438" y="1460" class="small">Green: audio signal path</text>
<text x="1438" y="1478" class="small">Purple: MIDI/software control</text>
<text x="1438" y="1496" class="small">Orange dashed: outgoing RTMP/RTMPS stream to YouTube</text>
<text x="1438" y="1514" class="small">Grey dashed: browser, Web HUD, RDP, or monitoring path</text>
<rect x="1990" y="1330" width="350" height="150" class="note"/>
<text x="2008" y="1360" class="section">Key Naming Reminders</text>
<text x="2008" y="1388" class="small">OBS scene/source names must match</text>
<text x="2008" y="1406" class="small">  Stream Agent config exactly.</text>
<text x="2008" y="1424" class="small">Axis preset names are exact-match and</text>
<text x="2008" y="1442" class="small">  case-sensitive.</text>
<text x="2008" y="1460" class="small">Current cleanup note: older Center</text>
<text x="2008" y="1478" class="small">  naming maps to East.</text>
<text x="40" y="1570" class="foot">Draft technical diagram. Verify exact reserved IPs for ER605 WAN, access point, mixer, and any extra switch before publishing.</text>
</svg>